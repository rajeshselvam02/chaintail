version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: chaintail-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: chaintail
      POSTGRES_PASSWORD: chaintail
      POSTGRES_DB: chaintail
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaintail"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chaintail-redis-dev
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
