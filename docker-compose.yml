version: '3.9'

services:

  postgres:
    image: postgres:17-alpine
    container_name: chaintail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chaintail
      POSTGRES_PASSWORD: chaintail
      POSTGRES_DB: chaintail
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaintail"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chaintail-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: chaintail-migrate
    command: ["node", "packages/shared/dist/db/migrate.js"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chaintail
      DB_PASSWORD: chaintail
      DB_NAME: chaintail
    depends_on:
      postgres:
        condition: service_healthy

  threat-sync:
    build:
      context: .
      dockerfile: docker/Dockerfile.threat-feeds
    container_name: chaintail-threat-sync
    command: ["node", "packages/threat-feeds/dist/index.js", "sync"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chaintail
      DB_PASSWORD: chaintail
      DB_NAME: chaintail
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: chaintail-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chaintail
      DB_PASSWORD: chaintail
      DB_NAME: chaintail
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USE_API: "true"
      BTC_NETWORK: mainnet
      API_PORT: 3001
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  mempool-watcher:
    build:
      context: .
      dockerfile: docker/Dockerfile.watcher
    container_name: chaintail-watcher
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chaintail
      DB_PASSWORD: chaintail
      DB_NAME: chaintail
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USE_API: "true"
      BTC_NETWORK: mainnet
    depends_on:
      api:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: chaintail-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:

networks:
  default:
    name: chaintail-network
